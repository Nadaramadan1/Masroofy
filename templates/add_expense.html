{% extends "base.html" %}

{% block title %}Add Expense - Masroofy{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px;">
    <div class="card">
        <h2>Add New Expense</h2>
        <p class="text-muted mb-4">Record a new spending entry for your active budget cycle.</p>

            <form action="{{ url_for('add_expense') }}" method="POST">
                <div class="form-group">
                    <label for="amount">Amount (EGP)</label>
                    <input type="number" id="amount" name="amount" class="form-control" step="0.01" min="0.01" placeholder="e.g. 150.50" required />
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <div class="category-grid">
                        <input class="cat-option" type="radio" name="category_id" id="cat1" value="Food" required />
                        <label class="cat-label" for="cat1"><span class="icon">🍔</span> Food</label>

                        <input class="cat-option" type="radio" name="category_id" id="cat2" value="Transport" />
                        <label class="cat-label" for="cat2"><span class="icon">🚌</span> Transport</label>

                        <input class="cat-option" type="radio" name="category_id" id="cat3" value="Shopping" />
                        <label class="cat-label" for="cat3"><span class="icon">🛍️</span> Shopping</label>

                        <input class="cat-option" type="radio" name="category_id" id="cat4" value="Health" />
                        <label class="cat-label" for="cat4"><span class="icon">💊</span> Health</label>

                        <input class="cat-option" type="radio" name="category_id" id="cat5" value="Fun" />
                        <label class="cat-label" for="cat5"><span class="icon">🎮</span> Fun</label>

                        <input class="cat-option" type="radio" name="category_id" id="cat6" value="Other" />
                        <label class="cat-label" for="cat6"><span class="icon">📦</span> Other</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="expense_date">Date</label>
                    <input type="date" id="expense_date" name="expense_date" class="form-control" required />
                </div>

                <div class="form-group">
                    <label for="note">Note <span class="text-muted" style="font-weight: normal;">(optional)</span></label>
                    <textarea id="note" name="note" class="form-control" rows="3" placeholder="What did you spend this on?"></textarea>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Save Expense</button>
            </form>
    </div>
</div>

<script>
    document.getElementById("expense_date").value = new Date().toISOString().split("T")[0];
</script>
{% endblock %}
